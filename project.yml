name: KitchenOSSiri
options:
  bundleIdPrefix: com.kitchenos
  createIntermediateGroups: true
packages:
  KitchenOSKit:
    path: KitchenOSKit
targets:
  KitchenOSSiri:
    type: application
    supportedDestinations: [macOS, iOS]
    deploymentTarget:
      macOS: "26.0"
      iOS: "26.0"
    sources:
      - KitchenOSSiri/Sources
    dependencies:
      - package: KitchenOSKit
        product: KitchenOSKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kitchenos.siri
        PRODUCT_NAME: KitchenOS
        GENERATE_INFOPLIST_FILE: NO
        # Per-SDK Info.plist: the iOS variant carries the UI*/LSRequiresIPhoneOS
        # keys that are meaningless (and sloppy) in the macOS bundle.
        "INFOPLIST_FILE[sdk=iphoneos*]": KitchenOSSiri/Info-iOS.plist
        "INFOPLIST_FILE[sdk=iphonesimulator*]": KitchenOSSiri/Info-iOS.plist
        "INFOPLIST_FILE[sdk=macosx*]": KitchenOSSiri/Info-macOS.plist
        # macOS-only entitlements (sandbox off for the local extraction path).
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": KitchenOSSiri/KitchenOSSiri-macOS.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: XZJ6358HHF
        ENABLE_PREVIEWS: YES
