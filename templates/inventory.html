<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KitchenOS Inventory</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --border: #e5e5e7;
            --text: #1d1d1f;
            --text-muted: #86868b;
            --accent: #0071e3;
            --accent-hover: #0077ED;
            --warn: #ff9500;
            --danger: #ff3b30;
            --sidebar-width: 280px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text); height: 100dvh; width: 100vw; overflow: hidden;
        }
        .app { display: flex; height: 100dvh; width: 100vw; }
        .sidebar {
            width: var(--sidebar-width); min-width: var(--sidebar-width);
            background: var(--card-bg); border-right: 1px solid var(--border);
            overflow-y: auto; padding: 1rem;
        }
        .sidebar h2 { font-size: 0.95rem; margin-bottom: 0.5rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .space-group { margin-bottom: 1rem; }
        .space-label { font-weight: 600; padding: 0.4rem 0.5rem; color: var(--text); }
        .shelf-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.4rem 0.75rem; border-radius: 6px; cursor: pointer;
            color: var(--text); font-size: 0.92rem;
        }
        .shelf-item:hover { background: var(--bg); }
        .shelf-item.active { background: var(--accent); color: white; }
        .shelf-item .count { font-size: 0.75rem; color: var(--text-muted); }
        .shelf-item.active .count { color: rgba(255,255,255,0.85); }
        .main { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap; }
        .header-bar h1 { font-size: 1.5rem; }
        .btn {
            padding: 0.55rem 1rem; border: none; border-radius: 8px; cursor: pointer;
            background: var(--accent); color: white; font-size: 0.9rem; font-weight: 500;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn.secondary { background: var(--card-bg); color: var(--text); border: 1px solid var(--border); }
        .section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 1rem; overflow: hidden; }
        .section-heading { padding: 0.75rem 1rem; font-weight: 600; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .section-heading .meta { font-size: 0.8rem; color: var(--text-muted); font-weight: 400; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--bg); color: var(--text-muted); font-weight: 500; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; }
        tr:last-child td { border-bottom: none; }
        .empty-section { padding: 1rem; color: var(--text-muted); font-style: italic; font-size: 0.9rem; }

        /* Modal */
        .modal-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-backdrop.show { display: flex; }
        .modal {
            background: var(--card-bg); border-radius: 12px; padding: 1.5rem;
            width: min(720px, 92vw); max-height: 90vh; overflow-y: auto;
        }
        .modal h2 { margin-bottom: 0.5rem; }
        .modal p { color: var(--text-muted); margin-bottom: 1rem; font-size: 0.9rem; }
        textarea {
            width: 100%; min-height: 180px; padding: 0.75rem; border: 1px solid var(--border);
            border-radius: 8px; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 0.85rem;
        }
        .preview-table { width: 100%; font-size: 0.85rem; margin-top: 1rem; }
        .preview-table th { background: var(--bg); }
        .preview-table .warn { color: var(--warn); font-size: 0.78rem; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1rem; }
        .toast {
            position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.75rem 1rem;
            border-radius: 8px; background: #1d1d1f; color: white; font-size: 0.9rem;
            opacity: 0; transition: opacity 0.2s; z-index: 200;
        }
        .toast.show { opacity: 1; }
        .toast.error { background: var(--danger); }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <h2>Spaces</h2>
        <div id="sidebar-content"></div>
    </aside>
    <main class="main">
        <div class="header-bar">
            <h1 id="main-title">Kitchen Inventory</h1>
            <div>
                <button class="btn secondary" onclick="loadInventory()">Refresh</button>
                <button class="btn" onclick="openPasteModal()">Paste from Claude</button>
            </div>
        </div>
        <div id="sections"></div>
    </main>
</div>

<div class="modal-backdrop" id="paste-modal">
    <div class="modal">
        <h2>Paste receipt table</h2>
        <p>
            Ask Claude to convert your receipt to this table, then paste it here:<br>
            <code>| Item | Qty | Unit |</code> &mdash; optional <code>Group</code>, <code>Location</code>, <code>Expires</code>, <code>Notes</code> columns override the defaults.
        </p>
        <textarea id="paste-input" placeholder="| Item | Qty | Unit |
|---|---|---|
| chicken breast | 2 | lb |
| eggs | 12 | each |"></textarea>
        <div id="preview-area"></div>
        <div class="modal-footer">
            <button class="btn secondary" onclick="closePasteModal()">Cancel</button>
            <button class="btn secondary" onclick="previewPaste()">Preview</button>
            <button class="btn" id="commit-btn" onclick="commitPaste()" disabled>Commit</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
let LAYOUT = null;
let INVENTORY = null;
let CURRENT_LOCATION = null;
let PREVIEW_ROWS = [];

async function loadLayout() {
    const r = await fetch('/api/inventory/layout');
    LAYOUT = await r.json();
}

async function loadInventory() {
    const r = await fetch('/api/inventory');
    INVENTORY = await r.json();
    renderSidebar();
    renderSections();
}

function renderSidebar() {
    const el = document.getElementById('sidebar-content');
    if (!LAYOUT || !INVENTORY) { el.textContent = 'loading...'; return; }
    const counts = {};
    for (const sec of INVENTORY.sections) counts[sec.location] = sec.rows.length;
    const totalAll = INVENTORY.row_count;

    const groups = {};
    for (const sp of LAYOUT.spaces) {
        if (!groups[sp.id]) groups[sp.id] = { label: sp.label, shelves: [] };
        groups[sp.id].shelves.push(sp);
    }

    let html = `<div class="shelf-item ${CURRENT_LOCATION === null ? 'active' : ''}" onclick="selectLocation(null)">
        <span>All</span><span class="count">${totalAll}</span></div>`;

    for (const [id, g] of Object.entries(groups)) {
        html += `<div class="space-group"><div class="space-label">${g.label}</div>`;
        for (const sh of g.shelves) {
            const active = CURRENT_LOCATION === sh.location ? 'active' : '';
            html += `<div class="shelf-item ${active}" onclick="selectLocation('${sh.location}')">
                <span>${sh.shelf_label}</span><span class="count">${counts[sh.location] || 0}</span></div>`;
        }
        html += `</div>`;
    }
    el.innerHTML = html;
}

function selectLocation(loc) {
    CURRENT_LOCATION = loc;
    renderSidebar();
    renderSections();
}

function renderSections() {
    const el = document.getElementById('sections');
    const title = document.getElementById('main-title');
    if (!INVENTORY) { el.textContent = 'loading...'; return; }
    const filtered = CURRENT_LOCATION
        ? INVENTORY.sections.filter(s => s.location === CURRENT_LOCATION)
        : INVENTORY.sections;
    title.textContent = CURRENT_LOCATION
        ? (filtered[0]?.heading || 'Kitchen Inventory')
        : 'Kitchen Inventory';

    let html = '';
    for (const sec of filtered) {
        if (sec.rows.length === 0 && CURRENT_LOCATION === null) continue; // hide empty when viewing All
        html += `<div class="section">
            <div class="section-heading"><span>${sec.heading}</span><span class="meta">${sec.rows.length} item${sec.rows.length === 1 ? '' : 's'}</span></div>`;
        if (sec.rows.length === 0) {
            html += `<div class="empty-section">No items yet.</div>`;
        } else {
            html += `<table><thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th>Group</th><th>Added</th><th>Expires</th><th>Notes</th></tr></thead><tbody>`;
            for (const r of sec.rows) {
                html += `<tr>
                    <td>${escape(r.item)}</td><td>${escape(r.qty)}</td><td>${escape(r.unit)}</td>
                    <td>${escape(r.group)}</td><td>${escape(r.added || '')}</td>
                    <td>${escape(r.expires || '')}</td><td>${escape(r.notes || '')}</td>
                </tr>`;
            }
            html += `</tbody></table>`;
        }
        html += `</div>`;
    }
    if (!html) html = `<div class="empty-section">No items yet. Click <strong>Paste from Claude</strong> to add some.</div>`;
    el.innerHTML = html;
}

function escape(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function openPasteModal() {
    document.getElementById('paste-modal').classList.add('show');
    document.getElementById('paste-input').focus();
}
function closePasteModal() {
    document.getElementById('paste-modal').classList.remove('show');
    document.getElementById('paste-input').value = '';
    document.getElementById('preview-area').innerHTML = '';
    document.getElementById('commit-btn').disabled = true;
    PREVIEW_ROWS = [];
}

async function previewPaste() {
    const md = document.getElementById('paste-input').value;
    if (!md.trim()) return toast('Paste a markdown table first', true);
    const r = await fetch('/api/inventory/paste', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({markdown: md}),
    });
    const data = await r.json();
    if (!r.ok) return toast(data.error || 'Preview failed', true);
    PREVIEW_ROWS = data.rows;
    renderPreview(data.rows, data.warnings);
    document.getElementById('commit-btn').disabled = data.rows.length === 0;
}

function renderPreview(rows, warnings) {
    const el = document.getElementById('preview-area');
    if (!rows || rows.length === 0) { el.innerHTML = '<p>No rows parsed.</p>'; return; }
    let html = `<h3 style="margin-top:1rem; margin-bottom:0.5rem; font-size:1rem;">Preview &mdash; ${rows.length} row(s)</h3>`;
    if (warnings.length) html += `<p class="warn" style="color:var(--warn); font-size:0.85rem;">${warnings.map(escape).join('<br>')}</p>`;
    html += `<table class="preview-table"><thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th>Group</th><th>Location</th><th>Expires</th></tr></thead><tbody>`;
    for (const r of rows) {
        const shelf = LAYOUT.spaces.find(s => s.location === r.location);
        html += `<tr><td>${escape(r.item)}</td><td>${escape(r.qty)}</td><td>${escape(r.unit)}</td>
            <td>${escape(r.group)}</td><td>${escape(shelf ? shelf.heading : r.location)}</td>
            <td>${escape(r.expires || '-')}</td></tr>`;
        if (r.warnings && r.warnings.length) {
            html += `<tr><td colspan="6" class="warn">! ${r.warnings.map(escape).join('; ')}</td></tr>`;
        }
    }
    html += `</tbody></table>`;
    el.innerHTML = html;
}

async function commitPaste() {
    if (!PREVIEW_ROWS.length) return;
    const r = await fetch('/api/inventory/commit', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({rows: PREVIEW_ROWS}),
    });
    const data = await r.json();
    if (!r.ok) return toast(data.error || 'Commit failed', true);
    toast(`Committed ${data.rows} row(s)`);
    closePasteModal();
    loadInventory();
}

function toast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => { t.className = 'toast' + (isError ? ' error' : ''); }, 2200);
}

(async () => {
    await loadLayout();
    await loadInventory();
})();
</script>
</body>
</html>
